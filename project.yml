name: MyApp

# ─────────────────────────────────────────────
# Global XcodeGen options
# Botflow injects features by modifying Sources/
# and re-running `make generate` — never edit
# the .xcodeproj directly.
# ─────────────────────────────────────────────
options:
  bundleIdPrefix: com.botflow
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  defaultConfig: Debug

# ─────────────────────────────────────────────
# Build configurations
# ─────────────────────────────────────────────
configs:
  Debug: debug
  Release: release

# ─────────────────────────────────────────────
# Project-wide build settings
# ─────────────────────────────────────────────
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    ALWAYS_SEARCH_USER_PATHS: NO
    CLANG_ENABLE_MODULES: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      COPY_PHASE_STRIP: NO

# ─────────────────────────────────────────────
# Application target
# Botflow AI will scaffold new targets (e.g.
# widgets, extensions) as additional entries
# here, then re-run `make generate`.
# ─────────────────────────────────────────────
targets:
  MyApp:
    type: application
    platform: iOS
    deploymentTarget: "18.0"

    # Source files — all .swift files under Sources/
    # are automatically included by XcodeGen.
    sources:
      - path: Sources
        type: group

    # Asset catalogs and other static resources
    resources:
      - path: Resources

    settings:
      base:
        PRODUCT_NAME: MyApp
        PRODUCT_BUNDLE_IDENTIFIER: com.botflow.myapp
        DEVELOPMENT_TEAM: ""               # Set your team ID here or via CI env

        # Modern Xcode-managed Info.plist (no separate file needed)
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: MyApp
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: >-
          UIInterfaceOrientationPortrait
          UIInterfaceOrientationPortraitUpsideDown
          UIInterfaceOrientationLandscapeLeft
          UIInterfaceOrientationLandscapeRight

        SWIFT_VERSION: "6.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"     # iPhone + iPad
